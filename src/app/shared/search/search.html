 <!-- Barra de búsqueda -->
  <form class="mb-2" (submit)="prevent($event)">
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="text" class="form-control" [placeholder]="place" (input)="onSearch($event.target.value)"/>
    </div>
  </form>
