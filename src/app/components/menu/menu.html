<div class="container-fluid vh-100">
    <div class="row h-100">
        <div class="col-lg-2 p-0 border-end d-flex flex-column bg-white">
            <div class="mt-5 text-center">
                <p class="font-monospace"><button class="btn btn-success"><i class="bi bi-book"></i></button> Panel del bibliotecario</p>
            </div>
            <hr>
            <div class="p-2">
                <a class="menu-item" routerLink="dashboard-vista" routerLinkActive="active"><i class="bi bi-book me-2"></i>Resumen</a>
                <a class="menu-item mt-2" routerLink="usuarios-vista" routerLinkActive="active" ><i class="bi bi-book me-2"></i>Usuarios</a>
                <a class="menu-item mt-2" routerLink="libros-vista" routerLinkActive="active" ><i class="bi bi-book me-2"></i>Libros</a>
                <a class="menu-item mt-2" routerLink="prestamos-vista" routerLinkActive="active" ><i class="bi bi-book me-2"></i>Prestamos</a>
            </div>
            <div class="mt-auto">
                <hr>
                <div class="p-3 m-0 border-bottom">
                    <p class="fs-6 font-monospace">Conectado como</p>
                    <p class="fs-6 fw-bold">
                        {{correo}}
                    </p>
                    <a class="btn btn-outline-success w-100 mb-3" (click)="auth.logout()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a>
                </div>
            </div>
            
        </div>
        
        
        <div class="col-lg-10 p-0">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
